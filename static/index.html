<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice RAG Agent</title>
    <meta name="description" content="Real-time voice AI agent with RAG-powered knowledge base retrieval">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header id="app-header">
        <div class="header-left">
            <div class="logo-icon">🎙️</div>
            <div>
                <h1>Voice RAG Agent</h1>
                <p class="subtitle">Ask questions about your documents</p>
            </div>
        </div>
        <div class="header-right">
            <label class="upload-btn" for="file-upload" id="upload-label">
                <span class="upload-icon">📄</span> Upload Document
            </label>
            <input type="file" id="file-upload" accept=".pdf,.txt" hidden>
            <div class="connection-dot" id="connection-dot" title="Disconnected"></div>
        </div>
    </header>

    <main id="chat-container">
        <div id="chat-messages">
            <div class="welcome-message" id="welcome-message">
                <div class="welcome-icon">🤖</div>
                <h2>Hello! I'm your Voice RAG Agent</h2>
                <p>Upload a document and ask me anything about it using your voice.</p>
                <div class="features-grid">
                    <div class="feature-card"><span>🎤</span><span>Voice Input</span></div>
                    <div class="feature-card"><span>📚</span><span>RAG Retrieval</span></div>
                    <div class="feature-card"><span>⚡</span><span>Low Latency</span></div>
                    <div class="feature-card"><span>🔊</span><span>Voice Response</span></div>
                </div>
            </div>
        </div>
    </main>

    <div id="status-bar"><span id="status-text">Ready</span></div>

    <div id="mic-area">
        <button id="mic-btn" class="mic-button" aria-label="Record voice">
            <div class="mic-pulse-ring"></div>
            <div class="mic-pulse-ring delay"></div>
            <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="1" width="6" height="12" rx="3" />
                <path d="M19 10v2a7 7 0 01-14 0v-2" />
                <line x1="12" y1="19" x2="12" y2="23" />
                <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
            <svg class="stop-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                <rect x="6" y="6" width="12" height="12" rx="2" />
            </svg>
        </button>
        <p class="mic-hint" id="mic-hint">Click to speak</p>
    </div>

    <div id="upload-toast" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
